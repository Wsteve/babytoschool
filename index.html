<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>幼小衔接智力成长乐园 - 趣味闯关游戏</title>
    <script>
      // Prevent crash when some dependency or env polyfill tries to set read-only window.fetch
      (function() {
        try {
          var originalFetch = window.fetch;
          Object.defineProperty(window, 'fetch', {
            get: function() {
              return originalFetch;
            },
            set: function(val) {
              originalFetch = val;
            },
            configurable: true,
            enumerable: true
          });
        } catch (e) {
          console.warn("Could not patch window.fetch setter: ", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
